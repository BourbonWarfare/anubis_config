- name: allow-wiki-assets
  action: ALLOW
  expression:
    all:
      - host.startsWith("wiki")
      - path.startsWith("/w/") || path.startsWith("/load.php") || path.startsWith("/resources/") || path.startsWith("/skins/") || path.startsWith("/extensions/") || path.startsWith("/images/")
- name: allow-wiki-page
  action: CHALLENGE
  expression:
  all:
    - host.startsWith("wiki")
    - method == "GET"
    - path == "/" || path == "/wiki/" || path == "/w/"
