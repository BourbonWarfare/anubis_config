- name: allow-backend-api
  action: ALLOW
  expression:
    all:
      - host.startsWith("staging") || host.startsWith("hub")
      - path.startsWith("/api/")

- name: challenge-backend-web
  action: CHALLENGE
  expression:
    all:
      - host.startsWith("staging") || host.startsWith("hub")
      - '!path.startsWith("/api/")'

