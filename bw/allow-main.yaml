- name: allow-main-assets
  action: ALLOW
  expression:
    all:
      - host == "bourbonwarfare.com" || host == "www.bourbonwarfare.com"
      - path.startsWith("/assets/")
- name: allow-main-page
  action: CHALLENGE
  expression:
    all:
      - host == "bourbonwarfare.com" || host == "www.bourbonwarfare.com"
      - path == "/"
